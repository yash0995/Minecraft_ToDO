<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Minecraft Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  :root {
    --wood:#A0722A; --panel:#2d2416; --panel2:#3a2e1a; --border:#6b4f2a;
    --text:#F5DEB3; --checked:#4a7c3f; --gold:#FFD700; --grass:#5D9E3A;
    --danger:#9e2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d0d;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px),
      repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px);
    background-size:32px 32px; min-height:100vh; font-family:'VT323',monospace; color:var(--text); padding:16px;
  }
  .container { max-width:960px; margin:0 auto; }
  header { text-align:center; margin-bottom:16px; padding:16px; background:var(--panel); border:4px solid var(--border); box-shadow:6px 6px 0 #000; transition: box-shadow 0.2s; }
  header:hover { box-shadow:8px 8px 0 #000; }
  header::before { content:''; position:absolute; inset:3px; border:2px solid rgba(255,255,255,0.07); pointer-events:none; }
  h1 { font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.8vw,17px); color:var(--gold); text-shadow:3px 3px 0 #7a5a00; letter-spacing:2px; line-height:1.7; animation: glowPulse 3s infinite; }
  @keyframes glowPulse {
    0% { text-shadow: 3px 3px 0 #7a5a00; }
    50% { text-shadow: 3px 3px 8px #ffcc44; }
    100% { text-shadow: 3px 3px 0 #7a5a00; }
  }
  .subtitle { font-size:19px; color:#aaa; margin-top:4px; }

  .top-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; justify-content: space-between; }
  .btn {
    background:var(--wood); border:3px solid #7a4e1a; border-bottom-color:#5a3010; border-right-color:#5a3010;
    color:#fff; padding:8px 14px; font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer;
    box-shadow:2px 2px 0 #000; white-space:nowrap; text-decoration: none; display: inline-block;
    transition: all 0.05s linear;
  }
  .btn:active { transform:translate(2px,2px); box-shadow:none; }
  .btn.gold { background:#8a6200; border-color:#5a4000; }
  .btn.danger { background:var(--danger); border-color:#5a1a1a; }
  .btn:hover { filter: brightness(1.1); }

  .list-panel { background:var(--panel); border:3px solid var(--border); padding:14px; box-shadow:6px 6px 0 #000; }

  /* Item card – with animations */
  .item-card {
    background: #1a1408;
    border: 2px solid #333;
    margin-bottom: 10px;
    padding: 12px 16px;
    transition: all 0.2s ease-in-out;
    animation: cardFadeIn 0.2s ease-out;
    transform-origin: top;
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-card:hover {
    border-color: var(--gold);
    background: #221e10;
    transform: translateX(4px);
  }
  .item-card.collected {
    background: #1a2a1a;
    border-color: var(--grass);
    opacity: 0.85;
    transition: all 0.3s;
  }

  .item-header {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .item-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 1px;
    flex: 2;
  }
  .collected-check {
    display: flex; align-items: center; gap: 6px;
    font-size: 18px; cursor: pointer;
  }
  .collected-check input {
    width: 22px; height: 22px; cursor: pointer; accent-color: var(--grass);
    transition: transform 0.1s;
  }
  .collected-check input:active { transform: scale(0.9); }

  .item-details {
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline;
    gap: 8px; margin-top: 6px;
  }
  .item-numbers {
    font-size: 20px; color: #ddd;
  }
  .item-numbers strong { color: var(--grass); font-weight: bold; }
  .stacks-info {
    font-size: 20px; background: #0a0a03; padding: 2px 10px;
    border-radius: 4px; border-left: 3px solid var(--gold); color: #ffe0a3;
  }
  .item-controls {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-top: 12px; padding-top: 8px; border-top: 1px dashed #4a3a1a;
  }
  .ctrl-btn {
    background: #2a2a1a; border: 2px solid #5a5a3a; color: #eee; font-size: 18px;
    font-weight: bold; cursor: pointer; padding: 4px 12px; font-family: monospace;
    transition: all 0.05s linear;
  }
  .ctrl-btn:active { transform: scale(0.94); }
  .ctrl-btn.del { background: #5a1a1a; border-color: #8a3a3a; }
  .ctrl-btn:hover { filter: brightness(1.2); }
  .qty-input {
    width: 85px; background: #111; border: 2px solid var(--border); color: var(--gold);
    padding: 6px 8px; font-family: 'VT323', monospace; font-size: 20px; text-align: center;
    transition: border 0.2s, box-shadow 0.2s;
  }
  .qty-input:focus { border-color: var(--gold); box-shadow: 0 0 5px gold; outline: none; }
  .empty-list { text-align: center; padding: 40px; font-size: 24px; color: #666; animation: fadeIn 0.3s; }
  .list-summary {
    margin-top: 16px; padding: 12px; background: #1a1208; border: 2px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    font-size: 20px;
    transition: background 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes qtyFlash {
    0% { background: #3a5a2a; }
    100% { background: #1a1408; }
  }
  .qty-flash {
    animation: qtyFlash 0.25s ease;
  }
  @media (max-width: 650px) {
    .item-details { flex-direction: column; align-items: flex-start; }
    .stacks-info { align-self: flex-start; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📋 MINECRAFT CHECKLIST</h1>
    <div class="subtitle">✔ mark collected items – 64 items per stack</div>
  </header>

  <div class="top-bar">
    <button class="btn gold" onclick="goBack()">◀ BACK TO SELECTOR</button>
    <button class="btn danger" onclick="clearAll()">🗑 CLEAR ALL</button>
  </div>

  <div class="list-panel">
    <div id="list-container"></div>
  </div>

  <div class="list-summary" id="list-summary"></div>
</div>

<script>
  const STACK_SIZE = 64;

  function getList() { return JSON.parse(localStorage.getItem('mc-todo-v3') || '[]'); }
  function saveList(list) { localStorage.setItem('mc-todo-v3', JSON.stringify(list)); }

  function formatStacks(quantity) {
    const stacks = Math.floor(quantity / STACK_SIZE);
    const remainder = quantity % STACK_SIZE;
    if (stacks === 0) return `0 stacks + ${remainder}`;
    if (remainder === 0) return `${stacks} stacks`;
    return `${stacks} stacks + ${remainder}`;
  }

  function animateQtyChange(element) {
    if (!element) return;
    element.classList.add('qty-flash');
    setTimeout(() => element.classList.remove('qty-flash'), 250);
  }

  function renderTodoList() {
    let list = getList();
    const container = document.getElementById('list-container');
    const summaryDiv = document.getElementById('list-summary');

    if (!list.length) {
      container.innerHTML = '<div class="empty-list">⛏ No items added yet.<br>Go back and select some!</div>';
      summaryDiv.innerHTML = '<span>📋 Distinct items: 0</span><span>🧱 Total quantity: 0</span><span>📦 Total stacks: 0</span>';
      return;
    }

    const sorted = [...list].sort((a,b) => {
      if (a.collected !== b.collected) return a.collected ? 1 : -1;
      return a.name.localeCompare(b.name);
    });

    container.innerHTML = sorted.map(item => {
      const stacksStr = formatStacks(item.qty);
      const collectedClass = item.collected ? 'collected' : '';
      return `
        <div class="item-card ${collectedClass}" data-id="${item.id}">
          <div class="item-header">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <label class="collected-check">
              <input type="checkbox" ${item.collected ? 'checked' : ''} onchange="toggleCollected('${item.id}', this.checked)">
              <span>Collected</span>
            </label>
          </div>
          <div class="item-details">
            <div class="item-numbers">
              <strong id="qty-val-${item.id}">${item.qty}</strong> items
            </div>
            <div class="stacks-info">
              📦 ${stacksStr}
            </div>
          </div>
          <div class="item-controls">
            <button class="ctrl-btn" onclick="changeQty('${item.id}', -1)">-1</button>
            <input type="number" id="qty-${item.id}" value="${item.qty}" min="1" max="99999" step="1" class="qty-input" onchange="updateQty('${item.id}', this.value)">
            <button class="ctrl-btn" onclick="changeQty('${item.id}', 1)">+1</button>
            <button class="ctrl-btn del" onclick="deleteItem('${item.id}')">✖ DELETE</button>
          </div>
        </div>
      `;
    }).join('');

    const totalItems = list.length;
    const totalQty = list.reduce((sum, i) => sum + i.qty, 0);
    const totalStacks = Math.floor(totalQty / STACK_SIZE);
    const totalRemainder = totalQty % STACK_SIZE;
    const collectedCount = list.filter(i => i.collected).length;
    summaryDiv.innerHTML = `
      <span>📋 Items: ${totalItems} (${collectedCount} collected)</span>
      <span>🧱 Total quantity: ${totalQty}</span>
      <span>📦 Total stacks: ${totalStacks} stacks + ${totalRemainder}</span>
    `;
  }

  function toggleCollected(id, isChecked) {
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) {
      item.collected = isChecked;
      saveList(list);
      renderTodoList();
    }
  }

  function changeQty(id, delta) {
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) {
      let newQty = item.qty + delta;
      if (newQty < 1) newQty = 1;
      if (newQty > 99999) newQty = 99999;
      item.qty = newQty;
      saveList(list);
      renderTodoList();
      // Animate the quantity display
      const qtySpan = document.getElementById(`qty-val-${id}`);
      if (qtySpan) animateQtyChange(qtySpan.parentElement);
    }
  }

  function updateQty(id, newVal) {
    let qty = parseInt(newVal);
    if (isNaN(qty) || qty < 1) qty = 1;
    if (qty > 99999) qty = 99999;
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) {
      item.qty = qty;
      saveList(list);
      renderTodoList();
      const input = document.getElementById(`qty-${id}`);
      if (input) animateQtyChange(input);
    }
  }

  function deleteItem(id) {
    let list = getList();
    list = list.filter(i => i.id !== id);
    saveList(list);
    renderTodoList();
  }

  function clearAll() {
    if (confirm('⚠️ Remove ALL items from your list? This cannot be undone.')) {
      saveList([]);
      renderTodoList();
    }
  }

  function goBack() {
    location.href = 'index.html';
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  renderTodoList();
</script>
</body>
</html>
