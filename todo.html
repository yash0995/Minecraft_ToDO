<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Minecraft List – Stacks View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  :root {
    --wood:#A0722A; --panel:#2d2416; --panel2:#3a2e1a; --border:#6b4f2a;
    --text:#F5DEB3; --checked:#4a7c3f; --gold:#FFD700; --grass:#5D9E3A;
    --danger:#9e2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d0d;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px),
      repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px);
    background-size:32px 32px; min-height:100vh; font-family:'VT323',monospace; color:var(--text); padding:16px;
  }
  .container { max-width:960px; margin:0 auto; }
  header { text-align:center; margin-bottom:16px; padding:16px; background:var(--panel); border:4px solid var(--border); box-shadow:6px 6px 0 #000; position:relative; }
  header::before { content:''; position:absolute; inset:3px; border:2px solid rgba(255,255,255,0.07); pointer-events:none; }
  h1 { font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.8vw,17px); color:var(--gold); text-shadow:3px 3px 0 #7a5a00; letter-spacing:2px; line-height:1.7; }
  .subtitle { font-size:19px; color:#aaa; margin-top:4px; }

  .top-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; justify-content: space-between; }
  .btn {
    background:var(--wood); border:3px solid #7a4e1a; border-bottom-color:#5a3010; border-right-color:#5a3010;
    color:#fff; padding:8px 14px; font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer;
    box-shadow:2px 2px 0 #000; white-space:nowrap; text-decoration: none; display: inline-block;
  }
  .btn:active { transform:translate(2px,2px); box-shadow:none; }
  .btn.gold { background:#8a6200; border-color:#5a4000; }
  .btn.danger { background:var(--danger); border-color:#5a1a1a; }

  .list-panel { background:var(--panel); border:3px solid var(--border); padding:14px; box-shadow:6px 6px 0 #000; }

  /* item card style – like the "Exterior Materials" list */
  .item-card {
    background: #1a1408;
    border: 2px solid #333;
    margin-bottom: 8px;
    padding: 12px 16px;
    transition: all 0.1s;
  }
  .item-card:hover { border-color: var(--gold); background: #221e10; }

  .item-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .item-details {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-top: 6px;
  }
  .item-numbers {
    font-size: 20px;
    color: #ddd;
  }
  .item-numbers strong {
    color: var(--grass);
    font-weight: bold;
  }
  .stacks-info {
    font-size: 20px;
    background: #0a0a03;
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    border-left: 3px solid var(--gold);
    color: #ffe0a3;
  }
  .item-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed #4a3a1a;
  }
  .ctrl-btn {
    background: #2a2a1a;
    border: 2px solid #5a5a3a;
    color: #eee;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    padding: 4px 12px;
    font-family: monospace;
    transition: 0.05s linear;
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn.del { background: #5a1a1a; border-color: #8a3a3a; }
  .qty-input {
    width: 85px;
    background: #111;
    border: 2px solid var(--border);
    color: var(--gold);
    padding: 6px 8px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    text-align: center;
  }
  .empty-list { text-align: center; padding: 40px; font-size: 24px; color: #666; }
  .list-summary {
    margin-top: 16px; padding: 12px; background: #1a1208; border: 2px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    font-size: 20px;
  }
  @media (max-width: 600px) {
    .item-details { flex-direction: column; align-items: flex-start; }
    .stacks-info { align-self: flex-start; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📦 YOUR MINECRAFT LIST</h1>
    <div class="subtitle">Stack‑optimised view – 64 items per stack</div>
  </header>

  <div class="top-bar">
    <button class="btn gold" onclick="goBack()">◀ BACK TO SELECTOR</button>
    <button class="btn danger" onclick="clearAll()">🗑 CLEAR ALL</button>
  </div>

  <div class="list-panel" id="list-panel">
    <div id="list-container"></div>
  </div>

  <div class="list-summary" id="list-summary"></div>
</div>

<script>
  // Stack size = 64 (Minecraft standard for almost all building blocks)
  const STACK_SIZE = 64;

  // Helper functions (same storage key as index.html)
  function getList() { return JSON.parse(localStorage.getItem('mc-todo-v3') || '[]'); }
  function saveList(list) { localStorage.setItem('mc-todo-v3', JSON.stringify(list)); }

  // Format quantity into "X stacks + Y" string
  function formatStacks(quantity) {
    const stacks = Math.floor(quantity / STACK_SIZE);
    const remainder = quantity % STACK_SIZE;
    if (stacks === 0) return `0 stacks + ${remainder}`;
    if (remainder === 0) return `${stacks} stacks`;
    return `${stacks} stacks + ${remainder}`;
  }

  // Render the list with beautiful stacks display
  function renderTodoList() {
    const list = getList();
    const container = document.getElementById('list-container');
    const summaryDiv = document.getElementById('list-summary');

    if (!list.length) {
      container.innerHTML = '<div class="empty-list">⛏ No items added yet.<br>Go back and select some!</div>';
      summaryDiv.innerHTML = '<span>📋 Distinct items: 0</span><span>🧱 Total quantity: 0</span>';
      return;
    }

    // Sort alphabetically by name
    const sorted = [...list].sort((a,b) => a.name.localeCompare(b.name));

    container.innerHTML = sorted.map(item => {
      const stacksStr = formatStacks(item.qty);
      return `
        <div class="item-card" data-id="${item.id}">
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-details">
            <div class="item-numbers">
              <strong>${item.qty}</strong> items
            </div>
            <div class="stacks-info">
              📦 ${stacksStr}
            </div>
          </div>
          <div class="item-controls">
            <button class="ctrl-btn" onclick="changeQty('${item.id}', -1)">-1</button>
            <input type="number" id="qty-${item.id}" value="${item.qty}" min="1" max="99999" step="1" class="qty-input" onchange="updateQty('${item.id}', this.value)">
            <button class="ctrl-btn" onclick="changeQty('${item.id}', 1)">+1</button>
            <button class="ctrl-btn del" onclick="deleteItem('${item.id}')">✖ DELETE</button>
          </div>
        </div>
      `;
    }).join('');

    // Calculate totals
    const totalItems = list.length;
    const totalQty = list.reduce((sum, i) => sum + i.qty, 0);
    const totalStacks = Math.floor(totalQty / STACK_SIZE);
    const totalRemainder = totalQty % STACK_SIZE;
    summaryDiv.innerHTML = `
      <span>📋 Distinct items: ${totalItems}</span>
      <span>🧱 Total quantity: ${totalQty}</span>
      <span>📦 Total stacks: ${totalStacks} stacks + ${totalRemainder}</span>
    `;
  }

  // Change quantity by delta
  function changeQty(id, delta) {
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) {
      let newQty = item.qty + delta;
      if (newQty < 1) newQty = 1;
      if (newQty > 99999) newQty = 99999;
      item.qty = newQty;
      saveList(list);
      renderTodoList();
    }
  }

  // Update quantity from input field
  function updateQty(id, newVal) {
    let qty = parseInt(newVal);
    if (isNaN(qty) || qty < 1) qty = 1;
    if (qty > 99999) qty = 99999;
    const list = getList();
    const item = list.find(i => i.id === id);
    if (item) {
      item.qty = qty;
      saveList(list);
      renderTodoList();
    }
  }

  // Delete single item
  function deleteItem(id) {
    let list = getList();
    list = list.filter(i => i.id !== id);
    saveList(list);
    renderTodoList();
  }

  // Clear entire list
  function clearAll() {
    if (confirm('⚠️ Remove ALL items from your list? This cannot be undone.')) {
      saveList([]);
      renderTodoList();
    }
  }

  // Navigate back to main selector
  function goBack() {
    location.href = 'index.html';
  }

  // Simple escape to prevent XSS (though item names are safe)
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Initial render
  renderTodoList();
</script>
</body>
</html>
