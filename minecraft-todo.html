<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Todo List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  :root {
    --wood:#A0722A; --panel:#2d2416; --panel2:#3a2e1a; --border:#6b4f2a;
    --text:#F5DEB3; --checked:#4a7c3f; --checked-text:#8fbc6a; --gold:#FFD700; --grass:#5D9E3A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d0d;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px),
      repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px);
    background-size:32px 32px; min-height:100vh; font-family:'VT323',monospace; color:var(--text); padding:16px;
    padding-bottom:80px;
  }
  .container { max-width:900px; margin:0 auto; }

  header { text-align:center; margin-bottom:16px; padding:16px; background:var(--panel); border:4px solid var(--border); box-shadow:6px 6px 0 #000; position:relative; }
  header::before { content:''; position:absolute; inset:3px; border:2px solid rgba(255,255,255,0.07); pointer-events:none; }
  h1 { font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.8vw,17px); color:var(--gold); text-shadow:3px 3px 0 #7a5a00; letter-spacing:2px; line-height:1.7; }
  .subtitle { font-size:19px; color:#aaa; margin-top:4px; }

  .stats-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .stat { background:var(--panel); border:3px solid var(--border); padding:8px 10px; font-size:16px; box-shadow:3px 3px 0 #000; flex:1; min-width:90px; text-align:center; line-height:1.5; }
  .stat span { color:var(--gold); font-size:20px; display:block; }

  .progress-bar { height:10px; background:#111; border:2px solid var(--border); margin-bottom:14px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--grass),#8fdf5a); transition:width 0.4s; }

  .panel { background:var(--panel); border:3px solid var(--border); padding:14px; box-shadow:6px 6px 0 #000; }

  .btn { background:var(--wood); border:3px solid #7a4e1a; border-bottom-color:#5a3010; border-right-color:#5a3010; color:#fff; padding:8px 13px; font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer; box-shadow:2px 2px 0 #000; white-space:nowrap; }
  .btn:active { transform:translate(2px,2px); box-shadow:none; }
  .btn.green { background:var(--checked); border-color:#2a5c20; border-bottom-color:#1a3c10; border-right-color:#1a3c10; }
  .btn.red { background:#7a2020; border-color:#4a1010; border-bottom-color:#2a0808; border-right-color:#2a0808; }
  .btn.gold { background:#8a6200; border-color:#5a4000; border-bottom-color:#3a2800; border-right-color:#3a2800; }

  .row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
  .row input { flex:1; min-width:140px; background:#111; border:3px solid var(--border); color:var(--text); padding:8px 10px; font-family:'VT323',monospace; font-size:20px; outline:none; }
  .row input:focus { border-color:var(--gold); }

  .filter-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-btn { background:#1a1a1a; border:2px solid #444; padding:5px 12px; font-family:'VT323',monospace; font-size:17px; cursor:pointer; color:#aaa; }
  .filter-btn.active { border-color:var(--gold); color:var(--gold); background:#2a2010; }

  .section-title { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--grass); padding:6px 0 10px; letter-spacing:2px; border-bottom:2px solid var(--border); margin-bottom:10px; }

  .item-list { display:flex; flex-direction:column; gap:4px; }
  .todo-item { display:grid; grid-template-columns:26px 1fr auto auto; align-items:center; gap:8px; background:#1e1812; border:2px solid var(--border); padding:9px 11px; transition:background 0.1s; }
  .todo-item:hover { background:#2a2016; }
  .todo-item.done { background:#0d180b; border-color:#2a4a22; }
  .todo-item.done .iname { text-decoration:line-through; color:var(--checked-text); }
  .todo-item.done .istacks { color:#5a8a4a; }

  .checkbox { width:22px; height:22px; border:3px solid var(--border); background:#111; display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; flex-shrink:0; }
  .todo-item.done .checkbox { background:var(--checked); border-color:#3a6a2a; }

  .iname { font-size:19px; cursor:pointer; }
  .iinfo { cursor:pointer; }
  .iqty { font-size:13px; color:#777; }
  .istacks { font-size:18px; color:var(--gold); }

  .del-btn { background:#5a1010; border:2px solid #3a0808; color:#ff7777; padding:4px 8px; cursor:pointer; font-size:18px; font-family:'VT323',monospace; flex-shrink:0; }
  .del-btn:hover { background:#8a2020; }

  .empty { text-align:center; color:#555; font-size:21px; padding:30px 10px; line-height:1.8; }

  /* Fixed bottom bar */
  .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#1a1208; border-top:3px solid var(--border); padding:10px 16px; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; box-shadow:0 -4px 0 #000; z-index:100; }

  @media(max-width:480px) { h1 { font-size:9px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📋 MINECRAFT TODO LIST</h1>
    <div class="subtitle">YOUR MATERIALS CHECKLIST</div>
  </header>

  <div class="stats-bar">
    <div class="stat">TOTAL<br><span id="s-total">0</span></div>
    <div class="stat">DONE<br><span id="s-done">0</span></div>
    <div class="stat">LEFT<br><span id="s-left">0</span></div>
    <div class="stat">PROGRESS<br><span id="s-pct">0%</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="panel">
    <div class="section-title">📦 MY MATERIALS LIST</div>

    <div class="row">
      <input id="search" placeholder="Search my list..." oninput="render()">
      <button class="btn green" onclick="checkAll()">✔ ALL</button>
      <button class="btn" onclick="uncheckAll()">↺ RESET</button>
      <button class="btn red" onclick="clearAll()">✕ CLEAR</button>
    </div>

    <div class="filter-row">
      <div class="filter-btn active" onclick="setFilter('all',this)">ALL</div>
      <div class="filter-btn" onclick="setFilter('todo',this)">TODO</div>
      <div class="filter-btn" onclick="setFilter('done',this)">DONE</div>
    </div>

    <div class="item-list" id="item-list"></div>
  </div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn gold" onclick="window.open('minecraft-select.html','_blank')">⛏ ADD MORE ITEMS</button>
  <button class="btn" onclick="location.reload()">↺ REFRESH</button>
</div>

<script>
let filter = 'all';

function getList() { return JSON.parse(localStorage.getItem('mc-todo-v3') || '[]'); }
function getChecked() { return JSON.parse(localStorage.getItem('mc-checked-v3') || '{}'); }
function saveChecked(c) { localStorage.setItem('mc-checked-v3', JSON.stringify(c)); }
function saveList(l) { localStorage.setItem('mc-todo-v3', JSON.stringify(l)); }

function stacks(n) {
  const s = Math.floor(n/64), r = n%64;
  if(s===0) return `${r} items`;
  if(r===0) return `${s} stack${s>1?'s':''}`;
  return `${s} stack${s>1?'s':''} + ${r}`;
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const list = getList();
  const checked = getChecked();
  const q = document.getElementById('search').value.toLowerCase();

  let filtered = list.filter(i => {
    if(!i.name.toLowerCase().includes(q)) return false;
    if(filter === 'done') return !!checked[i.id];
    if(filter === 'todo') return !checked[i.id];
    return true;
  });

  const el = document.getElementById('item-list');
  if(!filtered.length) {
    el.innerHTML = list.length
      ? `<div class="empty">No items match your filter.</div>`
      : `<div class="empty">Your list is empty!<br><br>Open the <strong style="color:var(--gold)">Item Selector</strong> below<br>to add materials.</div>`;
    updateStats(list, checked);
    return;
  }

  el.innerHTML = filtered.map(item => {
    const done = !!checked[item.id];
    return `<div class="todo-item${done?' done':''}">
      <div class="checkbox" onclick="toggle('${item.id}')">${done?'✔':''}</div>
      <div class="iinfo" onclick="toggle('${item.id}')">
        <div class="iname">${item.name}</div>
        <div class="iqty">${item.qty} items</div>
      </div>
      <div class="istacks" onclick="toggle('${item.id}')" style="cursor:pointer">${stacks(item.qty)}</div>
      <div class="del-btn" onclick="removeItem('${item.id}')">✕</div>
    </div>`;
  }).join('');

  updateStats(list, checked);
}

function toggle(id) {
  const checked = getChecked();
  checked[id] = !checked[id];
  if(!checked[id]) delete checked[id];
  saveChecked(checked);
  render();
}

function removeItem(id) {
  const list = getList().filter(i => i.id !== id);
  const checked = getChecked();
  delete checked[id];
  saveList(list); saveChecked(checked);
  render();
}

function checkAll() {
  const list = getList(); const checked = getChecked();
  list.forEach(i => { checked[i.id] = true; });
  saveChecked(checked); render();
}

function uncheckAll() {
  const list = getList(); const checked = getChecked();
  list.forEach(i => { delete checked[i.id]; });
  saveChecked(checked); render();
}

function clearAll() {
  if(!getList().length) return;
  if(!confirm('Clear your entire list?')) return;
  const checked = getChecked();
  getList().forEach(i => delete checked[i.id]);
  saveList([]); saveChecked(checked); render();
}

function updateStats(list, checked) {
  const total = list.length;
  const done = list.filter(i => checked[i.id]).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  const p = total ? Math.round(done/total*100) : 0;
  document.getElementById('s-pct').textContent = p+'%';
  document.getElementById('progress').style.width = p+'%';
}

// Auto-refresh when tab becomes visible (user switches back from selector)
document.addEventListener('visibilitychange', () => { if(!document.hidden) render(); });

render();
</script>
</body>
</html>
