<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Item Selector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  :root {
    --wood:#A0722A; --panel:#2d2416; --panel2:#3a2e1a; --border:#6b4f2a;
    --text:#F5DEB3; --checked:#4a7c3f; --gold:#FFD700; --grass:#5D9E3A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d0d;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px),
      repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(0,0,0,0.3) 31px,rgba(0,0,0,0.3) 32px);
    background-size:32px 32px; min-height:100vh; font-family:'VT323',monospace; color:var(--text); padding:16px;
  }
  .container { max-width:960px; margin:0 auto; }
  header { text-align:center; margin-bottom:16px; padding:16px; background:var(--panel); border:4px solid var(--border); box-shadow:6px 6px 0 #000; position:relative; }
  header::before { content:''; position:absolute; inset:3px; border:2px solid rgba(255,255,255,0.07); pointer-events:none; }
  h1 { font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.8vw,17px); color:var(--gold); text-shadow:3px 3px 0 #7a5a00; letter-spacing:2px; line-height:1.7; }
  .subtitle { font-size:19px; color:#aaa; margin-top:4px; }

  .top-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
  .top-bar input { flex:1; min-width:150px; background:#111; border:3px solid var(--border); color:var(--text); padding:9px 12px; font-family:'VT323',monospace; font-size:21px; outline:none; }
  .top-bar input:focus { border-color:var(--gold); }

  .btn { background:var(--wood); border:3px solid #7a4e1a; border-bottom-color:#5a3010; border-right-color:#5a3010; color:#fff; padding:8px 14px; font-family:'Press Start 2P',monospace; font-size:7px; cursor:pointer; box-shadow:2px 2px 0 #000; white-space:nowrap; }
  .btn:active { transform:translate(2px,2px); box-shadow:none; }
  .btn.gold { background:#8a6200; border-color:#5a4000; }
  .btn.green { background:var(--checked); border-color:#2a5c20; }

  .cat-row { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
  .cat-tab { background:#1a1a1a; border:2px solid #444; padding:5px 10px; font-family:'VT323',monospace; font-size:17px; cursor:pointer; color:#aaa; }
  .cat-tab.active { border-color:var(--gold); color:var(--gold); background:#2a2010; }
  .cat-tab:hover:not(.active) { color:var(--text); border-color:#888; }

  .panel { background:var(--panel); border:3px solid var(--border); padding:14px; box-shadow:6px 6px 0 #000; }

  .mc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:5px; max-height:55vh; overflow-y:auto; }
  .mc-block { background:#1a1408; border:2px solid #333; padding:8px 10px; cursor:pointer; font-family:'VT323',monospace; font-size:18px; color:#bbb; transition:all 0.1s; display:flex; justify-content:space-between; align-items:center; }
  .mc-block:hover { border-color:var(--gold); color:var(--gold); background:#2a2010; }
  .mc-block.selected { border-color:var(--grass); color:#8fdf5a; background:#0f200d; }
  .mc-block .badge { background:var(--grass); color:#000; font-size:13px; padding:1px 5px; min-width:18px; text-align:center; display:none; }
  .mc-block.selected .badge { display:inline-block; }

  /* Bottom tray */
  .tray { position:fixed; bottom:0; left:0; right:0; background:#1a1208; border-top:3px solid var(--border); padding:10px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; z-index:100; box-shadow:0 -4px 0 #000; }
  .tray-info { font-size:20px; color:#aaa; flex:1; }
  .tray-info span { color:var(--gold); font-size:22px; }
  .qty-wrap { display:flex; align-items:center; gap:6px; }
  .qty-wrap label { font-size:18px; color:#aaa; }
  .qty-wrap input { width:80px; background:#111; border:2px solid var(--border); color:var(--gold); padding:7px 8px; font-family:'VT323',monospace; font-size:20px; outline:none; text-align:center; }
  .qty-wrap input:focus { border-color:var(--gold); }
  .selected-label { font-size:19px; color:var(--gold); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .empty { color:#555; font-size:20px; padding:20px; text-align:center; grid-column:1/-1; }

  /* Floating view list btn */
  .fab { position:fixed; top:16px; right:16px; z-index:200; }

  @media(max-width:480px) { .mc-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); } }
</style>
</head>
<body>
<div class="fab">
  <button class="btn gold" onclick="openTodo()">📋 VIEW LIST (<span id="fab-count">0</span>)</button>
</div>

<div class="container">
  <header>
    <h1>⛏ MINECRAFT ITEM SELECTOR</h1>
    <div class="subtitle">Pick items → set quantity → add to your list</div>
  </header>

  <div class="top-bar">
    <input id="search" placeholder="Search any Minecraft item..." oninput="renderGrid()">
    <button class="btn" onclick="clearSearch()">✕ Clear</button>
  </div>

  <div class="cat-row" id="cat-row"></div>

  <div class="panel">
    <div class="mc-grid" id="mc-grid"></div>
  </div>
</div>

<!-- BOTTOM TRAY -->
<div class="tray">
  <div class="tray-info">Selected: <span id="tray-name">—</span></div>
  <div class="qty-wrap">
    <label>QTY:</label>
    <input type="number" id="qty" value="64" min="1" max="99999">
  </div>
  <button class="btn green" onclick="addToList()">＋ ADD TO LIST</button>
</div>

const allItems = [];
Object.entries(MC_ITEMS).forEach(([cat,arr]) => { if(cat!=="⭐ All") allItems.push(...arr); });
MC_ITEMS["⭐ All"] = [...new Set(allItems)].sort();

let selected = null;
let currentCat = "⭐ All";

function getList() { return JSON.parse(localStorage.getItem('mc-todo-v3') || '[]'); }
function saveList(list) { localStorage.setItem('mc-todo-v3', JSON.stringify(list)); }

function renderCats() {
  document.getElementById('cat-row').innerHTML = Object.keys(MC_ITEMS).map(c =>
    `<div class="cat-tab${c===currentCat?' active':''}" onclick='setCat(${JSON.stringify(c)})'>${c}</div>`
  ).join('');
}

function setCat(cat) { currentCat = cat; renderCats(); renderGrid(); }

function renderGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  let items = MC_ITEMS[currentCat] || [];
  if(q) items = items.filter(n => n.toLowerCase().includes(q));
  const list = getList();
  document.getElementById('mc-grid').innerHTML = items.length
    ? items.map(name => {
        const inList = list.find(i => i.name === name);
        const isSel = selected === name;
        return `<div class="mc-block${isSel?' selected':''}" onclick='selectItem(${JSON.stringify(name)})'>
          <span>${name}</span>
          ${inList ? `<span class="badge" style="display:inline-block">✔</span>` : ''}
        </div>`;
      }).join('')
    : '<div class="empty">No results found.</div>';
}

function selectItem(name) {
  selected = name;
  document.getElementById('tray-name').textContent = name;
  renderGrid();
}

function clearSearch() {
  document.getElementById('search').value = '';
  renderGrid();
}

function addToList() {
  if(!selected) { alert('Please select a block first!'); return; }
  const qty = Math.max(1, parseInt(document.getElementById('qty').value)||1);
  const list = getList();
  const existing = list.find(i => i.name === selected);
  if(existing) { existing.qty += qty; }
  else { list.push({ id: Date.now()+'_'+Math.random().toString(36).slice(2), name: selected, qty }); }
  saveList(list);
  updateFab();
  renderGrid();
  // Flash feedback
  const btn = document.querySelector('.btn.green');
  btn.textContent = '✔ ADDED!';
  setTimeout(() => { btn.textContent = '＋ ADD TO LIST'; }, 1000);
}

function updateFab() {
  document.getElementById('fab-count').textContent = getList().length;
}

function openTodo() {
  location.href='minecraft-todo-1.html';
}

renderCats();
renderGrid();
updateFab();
</script>

</html>
